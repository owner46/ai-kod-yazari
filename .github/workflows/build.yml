name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install React Native CLI
        run: npm install -g @react-native-community/cli

      - name: Create React Native project
        run: |
          npx react-native@0.73.6 init AiKodYazari --version 0.73.6 --skip-install
          cp App.tsx AiKodYazari/App.tsx
          cd AiKodYazari
          npm install

      - name: Build APK
        run: |
          cd AiKodYazari/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: ai-kod-yazari
          path: AiKodYazari/android/app/build/outputs/apk/release/*.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-kod-yazari.apk
          path: android/app/build/outputs/apk/release/*.apk
